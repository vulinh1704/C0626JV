<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bài 5</title>
</head>
<body>

<script>
    let n = +prompt("Nhập n: ");
    let arr = [];
    for (let i = 0; i < n; i++) {
        let element = +prompt(`Nhập phần tử ${i}: `);
        arr.push(element);
    }
    console.log(arr);

    /*
     số nguyên tố là những số lớn hơn 1 và chỉ chia hết cho 1 và chính nó (chỉ có 2 ước)
     2 3 5 7 11 13 17 ....

     chạy từ 1 -> căn bậc 2 của số đó: mà chỉ có ước là 1 -> số nguyên tố
     */

    let total = 0;
    for (let i = 0; i < arr.length; i++) {
        let numberCheck = arr[i];
        if (numberCheck <= 1) {
            continue;
        }
        let count = 0;
        // kiểm tra từ 1 đến số cần xét có bao nhiêu ước
        // for (let j = 1; j <= numberCheck; j++) {
        //     if (numberCheck % j === 0) {
        //         count++;
        //     }
        // }
        for (let j = 1; j <= Math.sqrt(numberCheck); j++) {
            if (numberCheck % j === 0) {
                count++;
            }
        }
        if(count === 1) {
            console.log(`Phần tử ${numberCheck} tại vị trí ${i} là số nguyên tố`);
            total += numberCheck;
        }
    }

    if(total > 0) {
        console.log(`Tổng các số nguyên tố có trong mảng là: ${total}`);
    }
</script>
</body>
</html>
