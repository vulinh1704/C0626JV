<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Imperial+Script&family=Yuyu&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Boldonse", system-ui;
            font-weight: 400;
            font-style: normal;
            font-size: 40px;
            background-image: url("https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExdzNjNHc2bGtibGI2c2N1cWdkNmg1bHh1cm50ZTZvbXdhMnp2MWU4cCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/WzR8zb0PN6bUmfz4DW/200.webp");
            background-size: cover;
        }

        #no {
            position: absolute;
            background-color: #f82727;
            margin-left: 20px;
            margin-top: 30px;
        }

        center {
            margin-top: 300px;
        }

        button {
            border: none;
            color: aliceblue;
            font-size: 30px;
        }
    </style>
</head>
<body>

<center>
<div>
    <h2 style="color: #e85c74">Do you love me?</h2>
    <button style="background-color: #0f810f;" onclick="clickYesBtn()">Yes</button>
    <button onmouseover="hoverNoBtn()" id="no">No</button>
</div>
</center>
<script>
    function hoverNoBtn() {
        let topPx = Math.random() * window.innerHeight; // 0 - 1000
        let leftPx = Math.random() * window.innerWidth;
        document.getElementById("no").style.top = `${topPx}px`;
        document.getElementById("no").style.left = `${leftPx}px`;
    }
    // Math.random(); radom ra được các số từ 0 -> nhỏ 1

    function clickYesBtn() {
        alert("I Love You So Much !!!!!");
    }
</script>
</body>
</html>
