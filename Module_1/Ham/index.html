    /*
    Bài 2 — Hàm tính giai thừa:
    Viết hàm factorial(n) trả về giá trị n! (dùng vòng lặp).
    Gọi thử với n = 5 và in kết quả.
    */

    function factorial(number) {
        let result = 1;
        for (let i = number; i >= 1 ; i--) {
            result *= i;
        }
        return result;
    }
